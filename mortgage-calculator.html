
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>房貸現金流計算機</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:20px}
input{width:120px;padding:6px}
table{border-collapse:collapse}
td{padding:6px}
.result{background:#f5f5f5;padding:12px;margin-top:15px;border-radius:8px}
</style>
</head>
<body>
<h2>房貸現金流計算機</h2>

<table>
<tr><td>貸款金額</td><td><input id="loan" value="7000000"></td></tr>
<tr><td>利率(%)</td><td><input id="rate" value="2.275"></td></tr>
<tr><td>貸款年限</td><td><input id="years" value="30"></td></tr>
<tr><td>寬限期(年)</td><td><input id="grace" value="2"></td></tr>
<tr><td>每月租金</td><td><input id="rent" value="25000"></td></tr>
</table>

<button onclick="calc()">計算</button>

<div class="result" id="out"></div>

<script>
function calc(){
 let P=parseFloat(document.getElementById('loan').value);
 let annual=parseFloat(document.getElementById('rate').value)/100;
 let years=parseFloat(document.getElementById('years').value);
 let rent=parseFloat(document.getElementById('rent').value);

 let r=annual/12;
 let n=years*12;

 let interestOnly=P*annual/12;
 let payment=P*r/(1-Math.pow(1+r,-n));

 document.getElementById('out').innerHTML=`
 <b>寬限期月繳：</b>${interestOnly.toFixed(0)} 元<br>
 <b>本息攤還月繳：</b>${payment.toFixed(0)} 元<br><br>

 <b>寬限期現金流：</b>${(rent-interestOnly).toFixed(0)} 元/月<br>
 <b>本息攤還現金流：</b>${(rent-payment).toFixed(0)} 元/月<br><br>

 <b>若租金=${rent.toFixed(0)}元，打平貸款金額約：</b>
 ${(25000/payment*P).toFixed(0)} 元
 `;
}
calc();
</script>
</body>
</html>
